<!-- 
  Wazuh Agent Configuration Snippet (ossec.conf)
  Purpose: Ingesting Microsoft Sysmon telemetry into the SIEM
  Path: C:\Program Files (x86)\ossec-agent\ossec.conf
-->

<!-- Existing default Windows logs... -->
<localfile>
  <location>Application</location>
  <log_format>eventchannel</log_format>
</localfile>

<localfile>
  <location>System</location>
  <log_format>eventchannel</log_format>
</localfile>

<!-- ADDED: Custom Sysmon Integration for Advanced EDR Capabilities -->
<localfile>
  <location>Microsoft-Windows-Sysmon/Operational</location>
  <log_format>eventchannel</log_format>
</localfile>
